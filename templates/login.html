<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Login</title><link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"></head><body><div class="login-page"><form method="POST" class="login-card"><div class="brand-box"><div class="brand-mark">F</div><div><h1>Fortlev</h1><span>Orçamentos Solares</span></div></div><h2>Acesso ao sistema</h2><div class="field"><label>Usuário</label><input type="text" name="username" required></div><div class="field"><label>Senha</label><input type="password" name="password" required></div><button type="submit" class="primary-btn large-btn full">Entrar</button><p class="login-tip">Padrão inicial: admin / admin</p>{% with messages = get_flashed_messages() %}{% if messages %}<div class="flash-stack">{% for message in messages %}<div class="flash-message">{{ message }}</div>{% endfor %}</div>{% endif %}{% endwith %}</form></div></body></html>
